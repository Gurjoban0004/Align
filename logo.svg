<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <!-- Warm cream background for standard icons -->
  <rect width="100" height="100" rx="22" fill="#faf9f5" />
  
  <!-- 4-Spoke Radial Asterisk (Spike Mark) in Coral -->
  <g transform="translate(50, 50)" fill="#cc785c">
    <!-- Horizontal spoke -->
    <path d="M -30 -6 C -15 -6, -10 -10, 0 -10 C 10 -10, 15 -6, 30 -6 C 30 6, 15 6, 0 6 C -10 6, -15 6, -30 -6 Z" transform="rotate(0)" />
    <!-- Vertical spoke -->
    <path d="M -30 -6 C -15 -6, -10 -10, 0 -10 C 10 -10, 15 -6, 30 -6 C 30 6, 15 6, 0 6 C -10 6, -15 6, -30 -6 Z" transform="rotate(90)" />
    <!-- Center circle overlay for smoothing -->
    <circle cx="0" cy="0" r="8" fill="#cc785c" />
  </g>
</svg>
